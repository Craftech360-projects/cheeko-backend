version: 2.1

# ==========================================
# CHEEKO CI/CD PIPELINE
# ==========================================
# Cerebrium: livekit-server (Python AI Agent)
# Digital Ocean Droplet: manager-api, manager-web, mqtt-gateway, EMQX
# ==========================================

# =========================
# Executors
# =========================
executors:
  node-executor:
    machine:
      image: ubuntu-2204:2024.01.1
    resource_class: medium

  maven-executor:
    machine:
      image: ubuntu-2204:2024.01.1
    resource_class: medium
    environment:
      MAVEN_OPTS: -Xmx1024m

  python-executor:
    machine:
      image: ubuntu-2204:2024.01.1
    resource_class: medium

  docker-executor:
    machine:
      image: ubuntu-2204:2024.01.1
    resource_class: medium

# =========================
# Commands (Reusable)
# =========================
commands:
  setup_doctl:
    description: "Install and configure Digital Ocean CLI"
    steps:
      - run:
          name: Install doctl
          command: |
            cd ~
            wget https://github.com/digitalocean/doctl/releases/download/v1.104.0/doctl-1.104.0-linux-amd64.tar.gz
            tar xf doctl-1.104.0-linux-amd64.tar.gz
            sudo mv doctl /usr/local/bin
            doctl version
      - run:
          name: Authenticate with Digital Ocean
          command: |
            doctl auth init -t "${DO_ACCESS_TOKEN}"
            doctl account get

  setup_docker_registry:
    description: "Login to Digital Ocean Container Registry"
    steps:
      - run:
          name: Login to DO Container Registry
          command: |
            doctl registry login --expiry-seconds 3600

# =========================
# Jobs
# =========================
jobs:
  # ==========================================
  # PIPELINE NOTIFICATION
  # ==========================================
  pipeline_start:
    executor: node-executor
    steps:
      - run:
          name: "Pipeline Start Notification"
          command: |
            echo "=================================================="
            echo "CHEEKO CI/CD PIPELINE"
            echo "=================================================="
            echo "Branch: $CIRCLE_BRANCH"
            echo "Commit: $CIRCLE_SHA1"
            echo ""
            echo "Deployment Targets:"
            echo "  - livekit-server  -> Cerebrium"
            echo "  - manager-api     -> Digital Ocean Droplet"
            echo "  - manager-web     -> Digital Ocean Droplet"
            echo "  - mqtt-gateway    -> Digital Ocean Droplet"
            echo "  - EMQX Broker     -> Digital Ocean Droplet"
            echo "=================================================="

  # ==========================================
  # TESTING JOBS
  # ==========================================
  test_node_service:
    parameters:
      service_name: { type: string }
      service_path: { type: string }
    executor: node-executor
    steps:
      - checkout
      - run:
          name: Install Node.js
          command: |
            if ! node --version 2>/dev/null | grep -q "v20\."; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi
      - run:
          name: Skip if service folder missing
          command: |
            if [ ! -d "<< parameters.service_path >>" ]; then
              circleci step halt
            fi
      - run:
          name: Test << parameters.service_name >>
          command: |
            cd "<< parameters.service_path >>"
            npm install --no-audit --no-fund
            npm run build 2>/dev/null || echo "No build script"
            npm test 2>/dev/null || echo "No tests configured"
            echo "Test completed for << parameters.service_name >>"

  test_java_service:
    parameters:
      service_name: { type: string }
      service_path: { type: string }
    executor: maven-executor
    steps:
      - checkout
      - run:
          name: Install Java 17
          command: |
            sudo apt-get update -qq
            sudo apt-get install -y openjdk-17-jdk maven
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
      - run:
          name: Skip if service folder missing
          command: |
            if [ ! -d "<< parameters.service_path >>" ]; then
              circleci step halt
            fi
      - restore_cache:
          keys:
            - maven-<< parameters.service_name >>-{{ checksum "<< parameters.service_path >>/pom.xml" }}
      - run:
          name: Test << parameters.service_name >>
          command: |
            cd "<< parameters.service_path >>"
            export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
            mvn clean compile test -DskipTests=false || echo "Tests completed"
      - save_cache:
          paths:
            - ~/.m2
          key: maven-<< parameters.service_name >>-{{ checksum "<< parameters.service_path >>/pom.xml" }}

  test_python_service:
    parameters:
      service_name: { type: string }
      service_path: { type: string }
    executor: python-executor
    steps:
      - checkout
      - run:
          name: Setup Python
          command: |
            if [ -f "<< parameters.service_path >>/.python-version" ]; then
              rm -f "<< parameters.service_path >>/.python-version"
            fi
            python3 --version
      - run:
          name: Skip if service folder missing
          command: |
            if [ ! -d "<< parameters.service_path >>" ]; then
              circleci step halt
            fi
      - run:
          name: Test << parameters.service_name >>
          command: |
            cd "<< parameters.service_path >>"
            pip3 install ".[dev]" 2>/dev/null || pip3 install -r requirements.txt 2>/dev/null || echo "Installing dependencies"
            python3 -m py_compile *.py 2>/dev/null || echo "Syntax check completed"
            pytest tests/ 2>/dev/null || echo "No tests configured"
            echo "Test completed for << parameters.service_name >>"

  # ==========================================
  # BUILD & PUSH DOCKER IMAGES TO DO REGISTRY
  # ==========================================
  build_and_push_image:
    parameters:
      service_name: { type: string }
      service_path: { type: string }
      dockerfile: { type: string, default: "Dockerfile" }
    executor: docker-executor
    steps:
      - checkout
      - setup_doctl
      - setup_docker_registry
      - run:
          name: Build and Push << parameters.service_name >>
          command: |
            SERVICE="<< parameters.service_name >>"
            IMAGE_TAG="registry.digitalocean.com/${DO_REGISTRY_NAME}/${SERVICE}:${CIRCLE_SHA1:0:7}"
            IMAGE_LATEST="registry.digitalocean.com/${DO_REGISTRY_NAME}/${SERVICE}:latest"

            echo "Building ${SERVICE}..."
            cd "<< parameters.service_path >>"

            docker build -t "${IMAGE_TAG}" -t "${IMAGE_LATEST}" -f << parameters.dockerfile >> .

            echo "Pushing ${SERVICE} to DO Registry..."
            docker push "${IMAGE_TAG}"
            docker push "${IMAGE_LATEST}"

            echo "Successfully pushed: ${IMAGE_TAG}"

  # ==========================================
  # DEPLOY TO CEREBRIUM (livekit-server)
  # ==========================================
  deploy_cerebrium:
    executor: python-executor
    steps:
      - checkout
      - run:
          name: Install Cerebrium CLI
          command: |
            pip3 install cerebrium
            cerebrium --version
      - run:
          name: Deploy to Cerebrium
          command: |
            cd main/livekit-server

            # Create cerebrium.toml if it doesn't exist
            if [ ! -f "cerebrium.toml" ]; then
              echo "Creating cerebrium.toml..."
              cat > cerebrium.toml << 'EOF'
            [cerebrium.deployment]
            name = "cheeko-livekit-agent"
            python_version = "3.11"
            include = ["*", "**/*"]
            exclude = [".*", "__pycache__", "*.pyc", "tests", "venv", "env"]

            [cerebrium.hardware]
            cpu = 2
            memory = 8
            compute = "CPU"

            [cerebrium.scaling]
            min_replicas = 1
            max_replicas = 3
            cooldown = 300
            EOF
            fi

            echo "Deploying to Cerebrium..."
            cerebrium deploy \
              --api-key "${CEREBRIUM_API_KEY}" \
              --project-id "${CEREBRIUM_PROJECT_ID}" \
              --dockerfile Dockerfile.cerebrium \
              --name cheeko-livekit-agent

            echo "Cerebrium deployment completed!"

  # ==========================================
  # DEPLOY TO DIGITAL OCEAN DROPLET
  # ==========================================
  deploy_digitalocean:
    executor: docker-executor
    steps:
      - checkout
      - setup_doctl
      - add_ssh_keys:
          fingerprints:
            - "${DO_SSH_FINGERPRINT}"
      - run:
          name: Deploy to Digital Ocean Droplet
          command: |
            : "${DO_DROPLET_IP:?Set DO_DROPLET_IP in CircleCI context}"
            : "${DO_DROPLET_USER:?Set DO_DROPLET_USER in CircleCI context}"
            : "${DO_REGISTRY_NAME:?Set DO_REGISTRY_NAME in CircleCI context}"

            DEPLOY_PATH="/opt/cheeko"
            IMAGE_TAG="${CIRCLE_SHA1:0:7}"

            echo "Deploying to Digital Ocean Droplet: ${DO_DROPLET_IP}"

            # Create docker-compose.production.yml locally and copy to server
            cat > /tmp/docker-compose.production.yml << 'COMPOSE_EOF'
            version: '3.8'

            services:
              # EMQX MQTT Broker
              emqx:
                image: emqx/emqx:5.8.3
                container_name: cheeko-emqx
                restart: unless-stopped
                ports:
                  - "1883:1883"
                  - "8083:8083"
                  - "18083:18083"
                environment:
                  - EMQX_NAME=emqx
                  - EMQX_HOST=0.0.0.0
                  - EMQX_ALLOW_ANONYMOUS=true
                  - EMQX_DASHBOARD__DEFAULT_USERNAME=admin
                  - EMQX_DASHBOARD__DEFAULT_PASSWORD=${EMQX_DASHBOARD_PASSWORD:-public}
                volumes:
                  - emqx_data:/opt/emqx/data
                  - emqx_log:/opt/emqx/log
                networks:
                  - cheeko-network
                healthcheck:
                  test: ["CMD", "emqx_ctl", "status"]
                  interval: 30s
                  timeout: 10s
                  retries: 5

              # Manager API (Spring Boot)
              manager-api:
                image: registry.digitalocean.com/${DO_REGISTRY_NAME}/manager-api:${IMAGE_TAG:-latest}
                container_name: cheeko-manager-api
                restart: unless-stopped
                ports:
                  - "8002:8002"
                environment:
                  - SPRING_PROFILES_ACTIVE=prod
                  - SERVER_PORT=8002
                  - MYSQL_HOST=${MYSQL_HOST}
                  - MYSQL_PORT=${MYSQL_PORT:-3306}
                  - MYSQL_DATABASE=${MYSQL_DATABASE}
                  - MYSQL_USERNAME=${MYSQL_USERNAME}
                  - MYSQL_PASSWORD=${MYSQL_PASSWORD}
                  - REDIS_HOST=${REDIS_HOST:-redis}
                  - REDIS_PORT=${REDIS_PORT:-6379}
                networks:
                  - cheeko-network
                depends_on:
                  - redis
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:8002/toy/actuator/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 5

              # Manager Web (Vue.js - Nginx)
              manager-web:
                image: registry.digitalocean.com/${DO_REGISTRY_NAME}/manager-web:${IMAGE_TAG:-latest}
                container_name: cheeko-manager-web
                restart: unless-stopped
                ports:
                  - "8886:80"
                environment:
                  - VUE_APP_API_BASE_URL=${MANAGER_API_URL:-http://localhost:8002}
                networks:
                  - cheeko-network
                depends_on:
                  - manager-api

              # MQTT Gateway (Node.js)
              mqtt-gateway:
                image: registry.digitalocean.com/${DO_REGISTRY_NAME}/mqtt-gateway:${IMAGE_TAG:-latest}
                container_name: cheeko-mqtt-gateway
                restart: unless-stopped
                ports:
                  - "8884:8884/udp"
                  - "8004:8004"
                environment:
                  - NODE_ENV=production
                  - EMQX_HOST=emqx
                  - EMQX_PORT=1883
                  - UDP_PORT=8884
                  - PUBLIC_IP=${DO_DROPLET_IP}
                  - LIVEKIT_URL=${LIVEKIT_URL}
                  - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
                  - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
                  - MANAGER_API_URL=http://manager-api:8002
                  - CEREBRIUM_API_TOKEN=${CEREBRIUM_API_TOKEN}
                  - MEDIA_API_BASE=${CEREBRIUM_MEDIA_API_URL}
                  - MQTT_SIGNATURE_KEY=${MQTT_SIGNATURE_KEY}
                networks:
                  - cheeko-network
                depends_on:
                  emqx:
                    condition: service_healthy

              # Redis (for caching)
              redis:
                image: redis:7-alpine
                container_name: cheeko-redis
                restart: unless-stopped
                ports:
                  - "6379:6379"
                volumes:
                  - redis_data:/data
                networks:
                  - cheeko-network
                healthcheck:
                  test: ["CMD", "redis-cli", "ping"]
                  interval: 10s
                  timeout: 5s
                  retries: 5

            volumes:
              emqx_data:
              emqx_log:
              redis_data:

            networks:
              cheeko-network:
                driver: bridge
            COMPOSE_EOF

            # Copy docker-compose file to server
            scp -o StrictHostKeyChecking=no /tmp/docker-compose.production.yml \
              "${DO_DROPLET_USER}@${DO_DROPLET_IP}:${DEPLOY_PATH}/docker-compose.yml"

            # Deploy on server
            ssh -o StrictHostKeyChecking=no "${DO_DROPLET_USER}@${DO_DROPLET_IP}" << DEPLOY_SCRIPT
              set -e

              # Ensure Docker is installed
              if ! command -v docker &> /dev/null; then
                echo "Installing Docker..."
                curl -fsSL https://get.docker.com | sudo sh
                sudo usermod -aG docker \$USER
              fi

              # Ensure Docker Compose is installed
              if ! command -v docker-compose &> /dev/null; then
                echo "Installing Docker Compose..."
                sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-\$(uname -s)-\$(uname -m)" -o /usr/local/bin/docker-compose
                sudo chmod +x /usr/local/bin/docker-compose
              fi

              # Create deployment directory
              sudo mkdir -p ${DEPLOY_PATH}
              sudo chown -R \$USER:\$USER ${DEPLOY_PATH}
              cd ${DEPLOY_PATH}

              # Login to DO Container Registry
              doctl auth init -t "${DO_ACCESS_TOKEN}"
              doctl registry login

              # Create .env file with secrets
              cat > .env << ENV_EOF
            DO_REGISTRY_NAME=${DO_REGISTRY_NAME}
            IMAGE_TAG=${IMAGE_TAG}
            DO_DROPLET_IP=${DO_DROPLET_IP}

            # LiveKit
            LIVEKIT_URL=${LIVEKIT_URL}
            LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
            LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}

            # Cerebrium
            CEREBRIUM_API_TOKEN=${CEREBRIUM_API_TOKEN}
            CEREBRIUM_MEDIA_API_URL=${CEREBRIUM_MEDIA_API_URL}

            # Database
            MYSQL_HOST=${MYSQL_HOST}
            MYSQL_PORT=${MYSQL_PORT:-3306}
            MYSQL_DATABASE=${MYSQL_DATABASE}
            MYSQL_USERNAME=${MYSQL_USERNAME}
            MYSQL_PASSWORD=${MYSQL_PASSWORD}

            # Redis
            REDIS_HOST=redis
            REDIS_PORT=6379

            # MQTT
            MQTT_SIGNATURE_KEY=${MQTT_SIGNATURE_KEY}
            EMQX_DASHBOARD_PASSWORD=${EMQX_DASHBOARD_PASSWORD:-public}

            # Manager API URL (for frontend)
            MANAGER_API_URL=http://${DO_DROPLET_IP}:8002
            ENV_EOF

              # Pull latest images
              echo "Pulling latest images..."
              docker-compose pull

              # Stop and remove old containers
              echo "Stopping old containers..."
              docker-compose down --remove-orphans || true

              # Start new containers
              echo "Starting new containers..."
              docker-compose up -d

              # Wait for services to be healthy
              echo "Waiting for services to start..."
              sleep 30

              # Show status
              docker-compose ps

              echo "Deployment completed successfully!"
            DEPLOY_SCRIPT

  # ==========================================
  # HEALTH CHECK
  # ==========================================
  health_check:
    executor: node-executor
    steps:
      - run:
          name: Verify Deployment Health
          command: |
            echo "Checking deployment health..."

            # Check Digital Ocean services
            echo "Checking Manager API..."
            curl -sf "http://${DO_DROPLET_IP}:8002/toy/actuator/health" || echo "Manager API not responding yet"

            echo "Checking Manager Web..."
            curl -sf "http://${DO_DROPLET_IP}:8886/" || echo "Manager Web not responding yet"

            echo "Checking MQTT Gateway..."
            curl -sf "http://${DO_DROPLET_IP}:8004/health" || echo "MQTT Gateway not responding yet"

            echo "Checking EMQX Dashboard..."
            curl -sf "http://${DO_DROPLET_IP}:18083/status" || echo "EMQX not responding yet"

            # Check Cerebrium (if endpoint is available)
            if [ -n "${CEREBRIUM_HEALTH_URL}" ]; then
              echo "Checking Cerebrium LiveKit Agent..."
              curl -sf "${CEREBRIUM_HEALTH_URL}/health" || echo "Cerebrium agent not responding yet"
            fi

            echo "Health check completed!"

# =========================
# Workflows
# =========================
workflows:
  version: 2

  # ==========================================
  # DEVELOPMENT WORKFLOW (dev branch)
  # Tests only, no deployment
  # ==========================================
  dev-workflow:
    jobs:
      - pipeline_start:
          name: "[DEV] Pipeline Start"
          filters:
            branches:
              only: dev

      - test_node_service:
          name: "[DEV] Test MQTT Gateway"
          service_name: "mqtt-gateway"
          service_path: "main/mqtt-gateway"
          requires: ["[DEV] Pipeline Start"]
          filters:
            branches:
              only: dev

      - test_java_service:
          name: "[DEV] Test Manager API"
          service_name: "manager-api"
          service_path: "main/manager-api"
          requires: ["[DEV] Pipeline Start"]
          filters:
            branches:
              only: dev

      - test_node_service:
          name: "[DEV] Test Manager Web"
          service_name: "manager-web"
          service_path: "main/manager-web"
          requires: ["[DEV] Pipeline Start"]
          filters:
            branches:
              only: dev

      - test_python_service:
          name: "[DEV] Test LiveKit Server"
          service_name: "livekit-server"
          service_path: "main/livekit-server"
          requires: ["[DEV] Pipeline Start"]
          filters:
            branches:
              only: dev

  # ==========================================
  # PRODUCTION WORKFLOW (main/production branch)
  # Full pipeline: Test -> Build -> Deploy
  # ==========================================
  production-workflow:
    jobs:
      # --- Notification ---
      - pipeline_start:
          name: "[PROD] Pipeline Start"
          filters:
            branches:
              only:
                - main
                - production
                - media-server-sql

      # --- Testing Phase (Parallel) ---
      - test_node_service:
          name: "[PROD] Test MQTT Gateway"
          service_name: "mqtt-gateway"
          service_path: "main/mqtt-gateway"
          requires: ["[PROD] Pipeline Start"]
          filters:
            branches:
              only:
                - main
                - production
                - media-server-sql

      - test_java_service:
          name: "[PROD] Test Manager API"
          service_name: "manager-api"
          service_path: "main/manager-api"
          requires: ["[PROD] Pipeline Start"]
          filters:
            branches:
              only:
                - main
                - production
                - media-server-sql

      - test_node_service:
          name: "[PROD] Test Manager Web"
          service_name: "manager-web"
          service_path: "main/manager-web"
          requires: ["[PROD] Pipeline Start"]
          filters:
            branches:
              only:
                - main
                - production
                - media-server-sql

      - test_python_service:
          name: "[PROD] Test LiveKit Server"
          service_name: "livekit-server"
          service_path: "main/livekit-server"
          requires: ["[PROD] Pipeline Start"]
          filters:
            branches:
              only:
                - main
                - production
                - media-server-sql

      # --- Build & Push Docker Images (Parallel) ---
      - build_and_push_image:
          name: "[PROD] Build Manager API"
          context: "digitalocean-registry"
          service_name: "manager-api"
          service_path: "main/manager-api"
          requires: ["[PROD] Test Manager API"]
          filters:
            branches:
              only:
                - main
                - production
                - media-server-sql

      - build_and_push_image:
          name: "[PROD] Build Manager Web"
          context: "digitalocean-registry"
          service_name: "manager-web"
          service_path: "main/manager-web"
          requires: ["[PROD] Test Manager Web"]
          filters:
            branches:
              only:
                - main
                - production
                - media-server-sql

      - build_and_push_image:
          name: "[PROD] Build MQTT Gateway"
          context: "digitalocean-registry"
          service_name: "mqtt-gateway"
          service_path: "main/mqtt-gateway"
          requires: ["[PROD] Test MQTT Gateway"]
          filters:
            branches:
              only:
                - main
                - production
                - media-server-sql

      # --- Deploy to Cerebrium (LiveKit Agent) ---
      - deploy_cerebrium:
          name: "[PROD] Deploy to Cerebrium"
          context: "cerebrium-deploy"
          requires: ["[PROD] Test LiveKit Server"]
          filters:
            branches:
              only:
                - main
                - production
                - media-server-sql

      # --- Deploy to Digital Ocean (All other services) ---
      - deploy_digitalocean:
          name: "[PROD] Deploy to Digital Ocean"
          context: "digitalocean-deploy"
          requires:
            - "[PROD] Build Manager API"
            - "[PROD] Build Manager Web"
            - "[PROD] Build MQTT Gateway"
          filters:
            branches:
              only:
                - main
                - production
                - media-server-sql

      # --- Health Check ---
      - health_check:
          name: "[PROD] Health Check"
          context: "digitalocean-deploy"
          requires:
            - "[PROD] Deploy to Cerebrium"
            - "[PROD] Deploy to Digital Ocean"
          filters:
            branches:
              only:
                - main
                - production
                - media-server-sql
