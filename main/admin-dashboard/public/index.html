<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cheeko Persona Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <span class="logo">
      <svg class="logo-mark" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M12 3c-3.3 0-6 2.5-6 5.8 0 1.7.7 3.2 1.9 4.3-.9.7-1.5 1.6-1.7 2.7-.2 1.1.2 2 .9 2.6.8.6 1.9.7 3 .3.6-.2 1.2-.6 1.9-1 .7.4 1.3.8 1.9 1 1.1.4 2.2.3 3-.3.7-.6 1.1-1.5.9-2.6-.2-1.1-.8-2-1.7-2.7C17.3 12 18 10.5 18 8.8 18 5.5 15.3 3 12 3Z"/>
        <circle cx="9.2" cy="8.4" r="1.1" fill="#fff"/>
        <circle cx="14.8" cy="8.4" r="1.1" fill="#fff"/>
      </svg>
      Cheeko Persona Admin
    </span>
    <button id="logout" class="btn ghost" hidden>
      <svg class="icn" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M15 4h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-3M10 17l-5-5 5-5M5 12h11"/></svg>
      Log out
    </button>
  </header>

  <main>
    <!-- Login -->
    <section id="loginView" class="card login">
      <div class="login-badge" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M12 2 4 5v6c0 5 3.4 9.4 8 11 4.6-1.6 8-6 8-11V5l-8-3Z"/><path d="m9 12 2 2 4-4" stroke="#fff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h1>Admin login</h1>
      <p class="login-sub">Sign in to edit Cheeko's personas.</p>
      <label for="password" class="sr-only">Admin password</label>
      <input id="password" type="password" placeholder="Admin password" autocomplete="current-password" />
      <button id="loginBtn" class="btn block">Enter</button>
      <p id="loginErr" class="err" role="alert" hidden></p>
    </section>

    <!-- Editor -->
    <section id="editorView" hidden>
      <div class="card toolbar">
        <div class="field">
          <label for="charSelect">Character</label>
          <div class="select-wrap">
            <select id="charSelect"></select>
            <svg class="select-arrow" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="m6 9 6 6 6-6"/></svg>
          </div>
        </div>
        <button id="newBtn" class="btn ghost">+ New Character</button>
      </div>

      <!-- New-character bar (create mode only) -->
      <div class="card toolbar" id="newCharBar" hidden>
        <div class="field">
          <label for="newName">Name (required, no numbers)</label>
          <input id="newName" placeholder="e.g. Bheem" />
        </div>
        <div class="field">
          <label for="newCode">Code (optional, no numbers)</label>
          <input id="newCode" placeholder="e.g. bheem" />
        </div>
        <button id="cancelNewBtn" class="btn ghost">Cancel</button>
      </div>

      <div class="editor-grid">
        <div class="card">
          <label for="agentMd">AGENT.md <code>system_prompt</code></label>
          <textarea id="agentMd" spellcheck="false"></textarea>
        </div>

        <div class="card">
          <label for="soulMd">SOUL.md <code>soul</code></label>
          <textarea id="soulMd" spellcheck="false"></textarea>
        </div>
      </div>

      <div class="card actionbar">
        <button id="saveBtn" class="btn">
          <svg class="icn" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
          Save
        </button>
        <span id="status" class="status" role="status" aria-live="polite"></span>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
