services:
  mqtt-gateway:
    build: .
    container_name: mqtt-gateway
    restart: always
    # On macOS, network_mode: host is not fully supported. We instead
    # expose the ports we actually need from the container.
    ports:
      # HTTP/status/health endpoint (inside container: 8004)
      - "8004:8004"
      # UDP audio port used by ESP32 devices (inside container: 8884/udp)
      - "8884:8884/udp"
    # Allow the container to reach services running on the host (EMQX, LiveKit, etc.)
    # using the special hostname host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config:/usr/src/app/config
      - ./logs:/usr/src/app/logs
      - ./.env:/usr/src/app/.env
    # Environment variables are loaded from .env automatically if it exists in the same directory
    # but we explicitly link it for clarity if the user moves the compose file.
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
