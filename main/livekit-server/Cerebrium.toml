[cerebrium.deployment]
name = "livekit-server-simple"
python_version = "3.11"
disable_auth = false
region = "eu-west-2"
include = ['./*', 'main.py', 'media_api.py', 'start.sh', 'requirements.txt', 'cerebrium.toml', 'config.yaml', 'src/**/*', 'config/**/*']
exclude = ['.*', '__pycache__/**/*', 'transcripts/**/*', '*.pyc']

[cerebrium.hardware]
cpu = 4
memory = 8.0
compute = "CPU"

[cerebrium.scaling]
min_replicas = 1
max_replicas = 8
cooldown = 30
replica_concurrency = 4
response_grace_period = 900
scaling_metric = "cpu_utilization"
scaling_target = 60

[cerebrium.runtime.custom]
port = 8080
dockerfile_path = "./Dockerfile.flyio"

