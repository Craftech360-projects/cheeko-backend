[cerebrium.deployment]
name = "cheeko-xai"
python_version = "3.11"
disable_auth = false
include = ['./*', 'main.py', 'media_api.py', 'start.sh', 'requirements.txt', 'cerebrium.toml', 'config.yaml', 'src/**/*', 'config/**/*', 'workers/**/*']
exclude = ['__pycache__/**/*', 'env/**/*', 'transcripts/**/*', '*.pyc', '.git/**/*', '.vscode/**/*']

[cerebrium.hardware]
region = "eu-west-2"
provider = "aws"
cpu = 4
memory = 8.0
compute = "CPU"

[cerebrium.scaling]
min_replicas = 1
max_replicas = 8
cooldown = 30
replica_concurrency = 4
response_grace_period = 900
scaling_metric = "cpu_utilization"
scaling_target = 60

[cerebrium.runtime.custom]
port = 8080
dockerfile_path = "./Dockerfile.cerebrium"

