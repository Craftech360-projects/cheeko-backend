# WER (Word Error Rate) Reference Sentences
# These are test sentences to be spoken in order during a WER test session.
# The system will compare Sarvam STT output against these references.
#
# Instructions:
#   1. Set wer_test_mode: true in config.yaml under sarvam.stt
#   2. Restart the agent
#   3. Speak each sentence clearly, one at a time, in order
#   4. After the session, run: python scripts/analyze_sarvam_metrics.py --wer
#
# Categories:
#   - simple: Short, clear sentences (warm-up)
#   - conversational: Natural speech patterns
#   - numbers: Sentences with numbers/counting
#   - code_mixed: Mixed language (Indian language + English)
#   - complex: Long or complex sentences
#   - children: Sentences a child (3-16) would say

kn-IN:
  simple:
    - "ನಮಸ್ಕಾರ ಚೀಕೋ"
    - "ನನ್ನ ಹೆಸರು ಅರ್ಜುನ್"
    - "ನಾನು ಚೆನ್ನಾಗಿದ್ದೇನೆ"
    - "ನೀನು ಹೇಗಿದ್ದೀಯ"
    - "ಇವತ್ತು ಶಾಲೆ ಇಲ್ಲ"
  conversational:
    - "ನನಗೆ ಒಂದು ಕಥೆ ಹೇಳು"
    - "ನಿನ್ನೆ ನಾನು ಪಾರ್ಕ್ ಗೆ ಹೋಗಿದ್ದೆ"
    - "ನನ್ನ ಅಮ್ಮ ಅಡುಗೆ ಮಾಡ್ತಾ ಇದ್ದಾರೆ"
    - "ನನಗೆ ಐಸ್ ಕ್ರೀಮ್ ತುಂಬಾ ಇಷ್ಟ"
    - "ನಾಳೆ ನಮ್ಮ ಹುಟ್ಟುಹಬ್ಬ ಇದೆ"
  numbers:
    - "ನನಗೆ ಎಂಟು ವರ್ಷ"
    - "ಒಂದು ಎರಡು ಮೂರು ನಾಲ್ಕು ಐದು"
    - "ನಾನು ಐದನೇ ತರಗತಿಯಲ್ಲಿ ಓದುತ್ತಿದ್ದೇನೆ"
    - "ಇಪ್ಪತ್ತು ಹತ್ತು ಸೇರಿಸಿದರೆ ಮೂವತ್ತು"
  code_mixed:
    - "ನನಗೆ math ತುಂಬಾ ಇಷ್ಟ"
    - "school ನಲ್ಲಿ ನಾವು cricket ಆಡ್ತೀವಿ"
    - "ನನ್ನ favourite colour blue"
    - "ನಾನು YouTube ನಲ್ಲಿ videos ನೋಡ್ತೀನಿ"
  complex:
    - "ನಮ್ಮ ಮನೆಯ ಹತ್ತಿರ ಒಂದು ದೊಡ್ಡ ಮರ ಇದೆ ಅಲ್ಲಿ ಪಕ್ಷಿಗಳು ಬರುತ್ತವೆ"
    - "ರಾಮಾಯಣದಲ್ಲಿ ಹನುಮಂತ ಸಮುದ್ರ ದಾಟಿ ಲಂಕೆಗೆ ಹೋದನು"
    - "ಬೆಂಗಳೂರಿನಲ್ಲಿ ಮಳೆ ಬರ್ತಾ ಇದೆ ಛತ್ರಿ ತೆಗೆದುಕೊಂಡು ಹೋಗು"
  children:
    - "ಚೀಕೋ ನನಗೊಂದು ಹಾಡು ಹೇಳು"
    - "ನನಗೆ ಹಸಿವಾಗ್ತಿದೆ"
    - "ನಾನು ಆಟ ಆಡ್ಬೇಕು"
    - "ನಿನಗೆ ಏನು ಗೊತ್ತು"

