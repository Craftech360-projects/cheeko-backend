# Cheeko ESP32 Server - Database Changelog
#
# Convention:
# - Each changeset ID should be unique and follow format: YYYYMMDDHHMM
# - Never modify existing changesets, always create new ones
# - Use validCheckSum: ANY for changesets that may need to run again

databaseChangeLog:
  - changeSet:
      id: V1_0_0_initial_schema
      author: cheeko
      validCheckSum: ANY
      changes:
        - sqlFile:
            encoding: utf8
            path: classpath:db/changelog/V1_0_0__initial_schema.sql

  - changeSet:
      id: V1_1_0_rfid_question_tables
      author: cheeko
      validCheckSum: ANY
      changes:
        - sqlFile:
            encoding: utf8
            path: classpath:db/changelog/V1_1_0__rfid_question_tables.sql

  - changeSet:
      id: V1_2_0_rfid_pack_and_series_tables
      author: cheeko
      validCheckSum: ANY
      changes:
        - sqlFile:
            encoding: utf8
            path: classpath:db/changelog/V1_2_0__rfid_pack_and_series_tables.sql

  - changeSet:
      id: V1_3_0_rfid_seed_data
      author: cheeko
      validCheckSum: ANY
      changes:
        - sqlFile:
            encoding: utf8
            path: classpath:db/changelog/V1_3_0__rfid_seed_data.sql

  - changeSet:
      id: V1_4_0_rfid_card_multi_questions
      author: cheeko
      validCheckSum: ANY
      changes:
        - sqlFile:
            encoding: utf8
            path: classpath:db/changelog/V1_4_0__rfid_card_multi_questions.sql

