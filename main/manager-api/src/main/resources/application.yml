# Tomcat
server:
  tomcat:
    uri-encoding: UTF-8
    threads:
      max: 1000
      min-spare: 30
  port: 8002
  servlet:
    context-path: /toy
    session:
      cookie:
        http-only: true

spring:
  # Environment: dev|test|prod
  # Profile will be set by SPRING_PROFILES_ACTIVE environment variable
  # Default to 'dev' if not specified
  profiles:
    default: prod
  messages:
    encoding: UTF-8
    basename: i18n/messages
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      enabled: true
  main:
    allow-bean-definition-overriding: true

knife4j:
  enable: true
  basic:
    enable: false
    username: admin
    password: admin
  setting:
    enableFooter: false

renren:
  redis:
    open: true
  xss:
    enabled: true
    exclude-urls:

# Textbook RAG Configuration
textbook:
  upload:
    directory: D:/cheekofinal/cheeko-esp32-server/main/manager-api/uploadfile/textbooks
  chunk:
    size: 512
    overlap: 50

# External Services
cheeko:
  python:
    server:
      url: http://localhost:8003

