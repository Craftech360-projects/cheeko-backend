#mybatis
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  # Entity scanning, multiple packages separated by comma or semicolon
  typeAliasesPackage: cheeko.modules.*.entity
  global-config:
    # Database related configuration
    db-config:
      # Primary key type
      id-type: ASSIGN_ID
    banner: false
  # Native configuration
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: "null"
  configuration-properties:
    prefix:
    blobType: BLOB
    boolValue: TRUE
