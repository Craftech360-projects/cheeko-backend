knife4j:
  production: false
  enable: true
  basic:
    enable: false
    username: renren
    password: 2ZABCDEUgF
  setting:
    enableFooter: false

# Server configuration for Railway
server:
  port: ${PORT:8002}
  address: 0.0.0.0
  secret: ${SERVER_SECRET:b14a6715-2139-47b0-bc2b-327314005320}
  tomcat:
    uri-encoding: UTF-8
    threads:
      max: 1000
      min-spare: 30
  servlet:
    context-path: /toy
    session:
      cookie:
        http-only: true

# Management endpoints for health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    xiaozhi: DEBUG

spring:
  datasource:
    druid:
      #Railway MySQL Configuration
      driver-class-name: com.mysql.cj.jdbc.Driver
      # Railway database connection - using environment variables
      url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Kolkata&nullCatalogMeansCurrent=true&useSSL=false&allowPublicKeyRetrieval=true
      username: ${MYSQLUSER}
      password: ${MYSQLPASSWORD}
      initial-size: 10
      max-active: 100
      min-idle: 10
      max-wait: 6000
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      stat-view-servlet:
        enabled: false
      filter:
        stat:
          log-slow-sql: true
          slow-sql-millis: 1000
          merge-sql: false
        wall:
          config:
            multi-statement-allow: true
  data:
    redis:
      # Railway Redis Configuration - using environment variables
      host: ${REDISHOST}
      port: ${REDISPORT}
      password: ${REDISPASSWORD}
      username: ${REDISUSER:default}
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
        shutdown-timeout: 100ms

# Liquibase configuration for Railway
liquibase:
  change-log: classpath:db/changelog/db.changelog-master.yaml
  enabled: true
  drop-first: false
