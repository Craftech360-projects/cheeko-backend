knife4j:
  production: true
  enable: false
  setting:
    enableFooter: false

# Server configuration for Railway/Cloud Run
server:
  port: 8002
  address: 0.0.0.0
  secret: ${SERVER_SECRET:b14a6715-2139-47b0-bc2b-327314005320}

# Management endpoints for health checks (Cloud Run requirement)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    org.springframework.boot.web: DEBUG
    liquibase: INFO

spring:
  main:
    web-application-type: servlet
  datasource:
    druid:
      # Cloud SQL MySQL (asia-south1)
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true&useSSL=false&allowPublicKeyRetrieval=true
      username: ${MYSQLUSER}
      password: ${MYSQLPASSWORD}

      initial-size: 1
      max-active: 10
      min-idle: 1
      max-wait: 3000

      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      stat-view-servlet:
        enabled: false
      filter:
        stat:
          log-slow-sql: true
          slow-sql-millis: 1000
          merge-sql: false
        wall:
          config:
            multi-statement-allow: true

  data:
    redis:
      # Cloud Memorystore Redis (asia-south1)
      host: ${REDISHOST}
      port: ${REDISPORT}
      password: ${REDISPASSWORD}
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
        shutdown-timeout: 100ms

liquibase:
  change-log: classpath:db/changelog/db.changelog-master.yaml
  enabled: true
  drop-first: false
